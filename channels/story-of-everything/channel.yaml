# Channel: THE STORY OF EVERYTHING — science-history documentary channel.
# Working title/brand — operator may rename before first publish (slug can stay).
#
# STRATEGY (differs from sleepless-historian on purpose):
#   - Long-form 30–40 min narrative documentaries, watched AWAKE. Education category.
#   - Topics come from a human-authored season plan (../../PILOT-LOST-IN-THE-COSMOS.md),
#     NOT auto-research. S1 expands a human episode brief; S2 drafts; the OPERATOR
#     rewrites and fact-checks the script before S3 (this human editorial pass is a
#     hard requirement — see §10 of PIPELINE-GOAL.md and COMPETITIVE-GAP.md).
#   - Structure reuses the two-phase renderer: phase 1 = illustrated documentary
#     (~92%), phase 2 = a short reflective CODA over a dark starfield + brief silence.
#     The coda is a signature ending, not a sleep tail.
#
# TODO before first LIVE render:
#   - Replace assets/logo.png (placeholder copied from demo channel) — tools/make_logo.py
#   - Generate a star-dust drift overlay to replace the ember loop (tools/make_overlay.py
#     restyle: cool white/blue star specks, slower drift, no smoke) → assets/starfield_overlay.mp4
#   - Pick the voice: Puck-with-lilt (distinctive, keep IQR as-is for awake viewing)
#     or the operator's own ElevenLabs professional clone (strongest identity moat).

channel:
  slug: story-of-everything
  display_name: "THE STORY OF EVERYTHING"

engines:
  script: claude
  image: gemini-flash
  tts: gemini            # Puck; switch to elevenlabs when own-voice clone is ready

voice:
  gemini_voice: Puck
  tts_instructions: >-
    Engaged, warm documentary narrator with natural melodic movement — curious and
    quietly awed, never breathless. Conversational pace with deliberate pauses at
    section turns. This is an AWAKE documentary: keep energy present; do not flatten
    intonation. Land dry humour deadpan, without signalling the joke.
  tts_speed: 1.0
  voice_id: env:ELEVENLABS_VOICE_ID     # fallback / future own-voice clone
  model: eleven_multilingual_v2
  stability: 0.45
  similarity_boost: 0.75

script:
  wpm: 150
  intro_template_verbatim: false   # NO boilerplate intro — every episode cold-opens
                                   # on a concrete scene/question (see script_system.md)
  outro: none                      # the coda IS the ending; no CTA outro
  hero_humor_density: medium       # dry Bryson-adjacent wit, ~2-4 beats / 1000 words
  tail_humor_density: low          # coda register: reflective, plain

structure:
  target_minutes: 35               # full episodes 30–40 min; pilot dev runs --minutes 25
  stories: [hero, tail]            # hero = the documentary body; tail = the CODA
  hero_share: 0.92                 # ~92% illustrated body, ~8% dark-starfield coda
  silent_ember_tail_minutes: 1     # 1 min of silent starfield after the coda, then end
  tail_eras_unrelated: false       # coda continues the SAME episode (reflection/next-episode tease)

visuals:
  resolution: "1920x1080"
  fps: 30
  hero_image_seconds: 20           # faster visual pace than sleep format (awake viewing)
  intro_ramp_holds: [4, 5, 5, 7, 9]  # cold open = quick montage, then steady 20s holds
  per_image_motion: none           # static stills + overlay motion (proven renderer path)
  image_transition_seconds: 0.35
  go_dark_transition: hard_cut     # body → coda: hard cut to starfield (signature beat)
  dark_floor_luma: 16
  ember_overlay: assets/starfield_overlay.mp4  # TODO generate; interim: ../../shared/youtube-overlay.mp4
  overlay_opacity_hero: 0.55       # subtler than sleep format — art should dominate
  overlay_opacity_dark: 1.0
  logo: assets/logo.png
  logo_height_frac: 0.11
  era_art_styles:                  # episode-theme → art direction (see prompts/image_style.md)
    cosmos:    "deep-space astronomical art, rich blacks, luminous nebulae, Hubble-palette blues and golds, painterly realism"
    deep_time: "sweeping geological landscape painting, strata and scale cues, warm mineral palette, 19th-century survey-expedition style"
    discovery: "warm candlelit historical scene, oil painting, instruments and manuscripts, Vermeer-adjacent light"
    life:      "detailed natural-history illustration, Ernst Haeckel richness, deep greens and ambers"
    human:     "atmospheric paleolithic scene painting, firelight and ice-age light, muted ochres"
    default:   "painterly realism, cinematic composition, rich contrast, no text"

audio:
  loudnorm: "I=-16:LRA=7:TP=-2"   # documentary loudness — louder than the sleep spec
  music_bed: none                  # v1 dry narration; revisit after pilot QC

thumbnail:
  brand_text: "THE STORY OF EVERYTHING"
  background: "#0b0e1a"
  text_color: "#f2ead9"
  scene_prompt: >-
    cinematic painterly illustration for a science-history documentary about {topic},
    one strong central subject, dramatic scale contrast (tiny human figure vs vast
    phenomenon), deep-space blues and warm gold accents, high contrast, awe-inspiring,
    no text anywhere
  logo_corner: bottom-left

metadata:
  category: Education                # NOT Entertainment — this is the documentary lane
  title_format: "{hook}"             # plain hook titles; no "- and more" formula
  leetspeak_taboo_titles: false
  description_boilerplate: |
    A documentary series about how we found out — the story of everything, told
    through the people who measured it, argued about it, and occasionally poisoned
    themselves proving it. Written from primary sources; corrections in pinned
    comments. New episodes every two weeks.
    # ^ short channel paragraph. S7 appends per-video timestamps; the operator adds
    #   a 2-3 sentence EPISODE-SPECIFIC summary + source list at upload (part of the
    #   human editorial layer — do not ship identical descriptions across videos).
  tags:                              # small base set; S7/operator adds per-episode tags
    - science history
    - history of science
    - documentary
    - astronomy
    - deep time
    - full documentary
