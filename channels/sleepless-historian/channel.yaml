# Channel profile: replicates @SleeplessHistorian exactly (see ../../../VIDEO-STRUCTURE.md).
# Channels are DATA — nothing in pipeline/ may reference this channel by name.

channel:
  slug: sleepless-historian
  display_name: "BORING HISTORY FOR SLEEP"

engines:                  # each switchable per run with --stub / --*-engine flags
  script: claude          # claude | gemini | stub
  image: gemini-flash     # gemini-flash (Nano Banana) | imagen-4 | stub
  tts: gemini             # Puck, young light-Irish storyteller (locked 2026-07-13)
                          # | elevenlabs (designed v1/v2 voices) | openai | stub

voice:
  # ACTIVE: "Take D" (locked 2026-07-15 after the 22-channel voice survey —
  # see ../../VOICE-LANDSCAPE.md): Puck, young + very faint Irish lilt, even
  # pitch, warmed EQ. Measured 106 Hz / IQR 33 / centroid 603 (the niche
  # "variant band"). full-001 is rendered with this voice.
  # (The Enceladus "late-night documentary" profile briefly staged here on
  # 2026-07-16 moved to the quiet-worlds channel — its natural home.)
  gemini_voice: Puck
  tts_instructions: >-
    Speak mostly neutral with only a VERY FAINT trace of an Irish accent —
    barely noticeable, just an occasional soft hint of the lilt on a word here
    and there, never strong. A young man in his early 20s — youthful, warm,
    boyish voice — telling bedtime tales. CRITICAL: keep the pitch very even
    and steady throughout — minimal intonation movement, no sing-song, no
    pitch rises and falls; a flat, calm, hypnotic, murmuring delivery.
    Measured relaxed pace, never rushed, faintly wry.
  tts_speed: 0.86   # measured: Puck+this wording = 132 wpm at 0.91 -> 0.86 ≈ 125 wpm
                    # (deliberately the slow SLH pocket — matches their Cleopatra 123)
  post_filter: >-   # "velvet-warm": compression + stronger low warmth + darkened top
    acompressor=threshold=-24dB:ratio=2.5:attack=15:release=180:makeup=2,
    equalizer=f=250:t=q:w=1.2:g=2.5,equalizer=f=3500:t=q:w=1.5:g=-2.5,
    treble=g=-3.5:f=6000
  # elevenlabs — designed voices (2026-07-13), matched to the measured SLH narrator
  # profile (F0 119 Hz, steady IQR 18, warm centroid 512):
  #   ACTIVE  "Sleepless Narrator v2 (young)"  A6QnFnaAbctdcKQmlLbT  (118/28/491 —
  #           pitch ≡ reference; younger remix of v1)
  #   backup  "Sleepless Narrator v1"          TUjJBGdeb0Jzc2XA7RNj  (97/16/449 —
  #           a touch deeper/older)
  voice_id: A6QnFnaAbctdcKQmlLbT
  model: eleven_multilingual_v2
  stability: 0.65            # damps v2's slightly livelier pitch movement
  similarity_boost: 0.75
  elevenlabs_speed: 1.0      # measured: v2 speaks 147 wpm native — already on target

script:
  wpm: 145
  intro_template_verbatim: true       # the hardcoded ~45s opener (prompts/script_system.md)
  outro: none                         # NEVER an outro/CTA at the end
  hero_humor_density: high            # ~5–8 dry beats / 1000 words
  tail_humor_density: low

structure:                            # two-phase model, measured
  target_minutes: 130
  stories: [hero, tail, tail, tail]   # 1 illustrated hero + 3 dark tail stories
  hero_share: 0.34                    # ~1/3 bright, ~2/3 dark
  silent_ember_tail_minutes: 8        # narration-free ember outro
  tail_eras_unrelated: true           # tail topics from DIFFERENT eras than the hero

visuals:                              # numbers are MEASURED — see VIDEO-STRUCTURE.md
  resolution: "1920x1080"
  fps: 30
  hero_image_seconds: 34              # steady-state hold
  intro_ramp_holds: [6, 6, 7, 10, 14] # first images: faster montage, then steady state
  per_image_motion: none              # stills are COMPLETELY static
  image_transition: fadeblack         # operator pick: fade out through dark, fade in
                                      #   (SLH-measured original: hblur @ 0.35s)
  image_transition_seconds: 1.5       # gentle; pairs with fadeblack
  go_dark_transition: hard_cut        # single-frame cut to black
  dark_floor_luma: 19
  ember_overlay: ../../shared/youtube-overlay.mp4  # operator-chosen 4K stock, prepped via tools/prep_overlay.py
  overlay_opacity_hero: 0.85          # screen blend weight over bright art
  overlay_opacity_dark: 1.0
  logo: assets/logo.png               # bottom-left, both phases, always
  logo_height_frac: 0.13
  era_art_styles:
    medieval: "medieval illuminated-manuscript painting, flat perspective, gold-leaf details, period miniature style"
    tudor: "Renaissance fresco painting, warm muted palette, monumental figures"
    rome_egypt: "19th-century academic oil painting, warm detailed classical scene"
    greek_myth: "ancient Grecian urn art style, orange and black figures, decorative borders"
    feudal_japan: "ukiyo-e woodblock print, flat color planes, cherry blossom accents"
    default: "19th-century academic oil painting, warm detailed historical scene"

audio:                                # measured — VIDEO-STRUCTURE.md §5
  loudnorm: "I=-19.5:LRA=6:TP=-2"     # −19.5 LUFS integrated; quieter than YT ref on purpose
  music_bed: none

thumbnail:                            # one branded template, comedy sells the click
  brand_text: "BORING HISTORY FOR SLEEP"
  background: "#f5f1e8"
  text_color: "#111111"
  scene_prompt: >-
    cartoon illustration, thick dark outlines, warm earthy palette of browns tans and
    muted reds, storybook style, 2-3 characters with exaggerated comedic expressions
    (shock, cackling, snoring) interacting in a scene about {topic}, small topic props
    scattered around, plain warm off-white background, no text anywhere
  logo_corner: bottom-left

metadata:
  category: Entertainment
  title_format: "{hook} - and more"   # hook-first; brand lives in the thumbnail
  leetspeak_taboo_titles: true        # S3X-style spellings ONLY in title/thumbnail
  description_boilerplate: |
    Welcome to tonight's sleep story. This is boring history for sleep — calm,
    slow-paced storytelling designed to help you fall asleep fast and stay asleep
    all night. Use it as a bedtime story for grown-ups, a sleep meditation, or
    quiet background audio for studying and relaxing. After the opening chapter
    the screen fades to a dark, black screen background with softly drifting
    embers — no bright light, no loud sounds, no interruptions, and no outro to
    wake you. Perfect for insomnia, overthinking, or simply winding down after a
    long day. Dim the lights, get comfortable, maybe turn on a fan for that soft
    background hum, and let tonight's journey carry you off to sleep. Sweet
    dreams, and see you tomorrow night.
  tags:
    - History
    - boring history
    - weird history
    - sleep stories
    - sleep
    - fall asleep fast
    - sleep video
    - rain sounds for sleep
    - stories for sleep
    - bedtime stories
    - bedtime story
    - boring history for sleep
    - learn history while you sleep
